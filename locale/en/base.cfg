[mod-setting-description]
pii-spreader=How many ticks will it take to visit a chest again. Not too UPS costly, chest checks are cheap. Instead this is better used as a throughput setting. Throughput for packing depends on the stack size, but (in optimal timings) the default setting is 10/s for items that stack to 50 for the wood chest, 60/s for the iron chest and 200/s for the steel chest.

